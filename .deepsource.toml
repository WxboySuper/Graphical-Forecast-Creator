version = 1

exclude_patterns = [
  "build/**",
  "server/release/**",
  "scripts/lib/production-release.test.mjs",
  "scripts/lib/bump-beta-after-main-release.test.mjs",
  "scripts/lib/github-paginate.test.mjs",
  "scripts/lib/pr-ci-label-state.test.mjs",
  "scripts/validate-feature-exposure.mjs",
  "scripts/validate-feature-exposure.integration.test.mjs",
  "scripts/generate-exposure-report.mjs",
  "scripts/generate-exposure-report.integration.test.mjs",
  "scripts/validate-promotion-exposure-pr.mjs",
  "scripts/lib/feature-exposure-report.mjs",
  "scripts/lib/pr-exposure-comment.mjs",
  "scripts/lib/feature-exposure-report.test.mjs",
  "scripts/lib/feature-exposure-source-parser.mjs",
  "scripts/lib/feature-exposure-policy.mjs",
  "scripts/lib/feature-exposure-policy-alignment.mjs",
  "scripts/lib/feature-exposure-policy-contract.mjs",
  "scripts/generate-stale-branch-report.mjs",
  "scripts/lib/stale-branch-github.mjs",
  "scripts/lib/stale-branch-report.mjs",
  "scripts/lib/stale-branch-report.test.mjs",
  "server/**/*.test.js",
  "src/**/*.test.ts",
  "src/**/*.test.tsx",
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  cyclomatic_complexity_threshold = "critical"
  skip_doc_coverage = [
    "function-declaration",
    "function-expression",
    "arrow-function-expression",
    "class-declaration",
    "class-expression",
    "method-definition",
  ]

  [analyzers.features]
  parse_test_files = false
