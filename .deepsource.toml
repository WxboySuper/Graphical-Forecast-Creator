version = 1

exclude_patterns = [
  "build/**",
  "scripts/lib/**/*.test.mjs",
  "src/**/*.test.ts",
  "src/**/*.test.tsx",
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  skip_doc_coverage = [
    "server/release/**",
    "scripts/validate-production-release.mjs",
  ]

  [analyzers.features]
  parse_test_files = false
