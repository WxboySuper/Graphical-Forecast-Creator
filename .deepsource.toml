version = 1

exclude_patterns = [
  "build/**",
  "server/release/**",
  "scripts/lib/production-release.test.mjs",
  "src/**/*.test.ts",
  "src/**/*.test.tsx",
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]

  [analyzers.features]
  parse_test_files = false
