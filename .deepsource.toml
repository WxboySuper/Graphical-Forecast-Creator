version = 1

exclude_patterns = ["build/**"]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  cyclomatic_complexity_threshold = "critical"
  skip_doc_coverage = [
    "function-declaration",
    "function-expression",
    "arrow-function-expression",
    "class-declaration",
    "class-expression",
    "method-definition",
  ]

  [analyzers.features]
  parse_test_files = false