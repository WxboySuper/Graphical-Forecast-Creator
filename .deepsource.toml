version = 1

exclude_patterns = [
  "build/**",
  "server/release/**",
  "scripts/lib/production-release.test.mjs",
  "scripts/lib/bump-beta-after-main-release.test.mjs",
  "scripts/lib/github-paginate.test.mjs",
  "scripts/lib/pr-ci-label-state.test.mjs",
  "scripts/validate-feature-exposure.mjs",
  "scripts/validate-feature-exposure.integration.test.mjs",
  "scripts/lib/feature-exposure-policy.mjs",
  "server/**/*.test.js",
  "src/**/*.test.ts",
  "src/**/*.test.tsx",
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  cyclomatic_complexity_threshold = "critical"
  skip_doc_coverage = [
    "function-declaration",
    "function-expression",
    "arrow-function-expression",
    "class-declaration",
    "class-expression",
    "method-definition",
  ]

  [analyzers.features]
  parse_test_files = false
