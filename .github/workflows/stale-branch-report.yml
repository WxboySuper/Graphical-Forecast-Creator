name: Stale branch report

# Informational maintainer report for drifting feature/fix/research branches.
# Does not delete branches or block PR checks.
on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Use fixture data instead of live GitHub API
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: stale-branch-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.x'

      - name: Generate stale branch report
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && '1' || '' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node scripts/generate-stale-branch-report.mjs
