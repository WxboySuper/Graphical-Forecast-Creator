name: Agent PR CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  agent-compliance:
    runs-on: ubuntu-latest
    if: >-
      contains(join(github.event.pull_request.labels.*.name, ','), 'agentic-work')
      || startsWith(github.head_ref, 'agent/')
      || startsWith(github.head_ref, 'hotfix/agent')
      || startsWith(github.head_ref, 'feat/agent')
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Validate agent workflow compliance
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "=== Agent PR Compliance Check ==="

          # Check PR has a body
          if [ -z "$PR_BODY" ]; then
            echo "::error::PR body is empty. Agent PRs must include a description."
            exit 1
          fi

          # Check for changelog section
          if ! echo "$PR_BODY" | grep -qiE '(##\s*Changelog|CHANGELOG)'; then
            echo "::error::PR must include a Changelog section or update CHANGELOG files."
            exit 1
          fi

          echo "✅ Agent PR compliance checks passed"
