name: Deploy Beta

permissions:
  contents: read

# One deploy per beta prerelease. post-merge-automation publishes vX.Y.Z-beta.N after
# the version-bump push, so merge pushes no longer trigger duplicate deploys.
concurrency:
  group: deploy-beta

on:
  release:
    types: [prereleased]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag or branch to deploy (default: beta HEAD)'
        required: false
        type: string

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.release.target_commitish == 'beta'
    runs-on: ubuntu-latest
    env:
      RSYNC_RSH: ssh -o StrictHostKeyChecking=yes

    steps:
      - name: Resolve checkout ref
        id: checkout_ref
        env:
          GHA_EVENT_NAME: ${{ github.event_name }}
          GHA_TAG_NAME: ${{ github.event.release.tag_name }}
          GHA_INPUT_REF: ${{ inputs.ref }}
        run: |
          if [ "$GHA_EVENT_NAME" = "release" ]; then
            echo "ref=${GHA_TAG_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "$GHA_INPUT_REF" ]; then
            echo "ref=${GHA_INPUT_REF}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ steps.checkout_ref.outputs.ref }}

      - name: Verify beta release tag matches package.json
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').version")
          if [ "v${PKG}" != "$RELEASE_TAG" ]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match package.json version ${PKG}" >&2
            exit 1
          fi
          if ! printf '%s' "$PKG" | grep -Eq -- '-beta\.[0-9]+$'; then
            echo "::error::Deploy Beta requires a -beta.N package.json version, got ${PKG}" >&2
            exit 1
          fi

      - name: Setup pnpm
<<<<<<< HEAD
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9
=======
        uses: pnpm/action-setup@v4
>>>>>>> origin/pr/753

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: app_version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm run build
        env:
          # Override the homepage so asset paths target the beta domain
          PUBLIC_URL: https://beta-gfc.weatherboysuper.com
          VITE_BUILD_TARGET: beta
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_BETA_MODE: true
          VITE_BETA_INVITE_PATH: ${{ secrets.BETA_INVITE_PATH }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: beta
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          # Prevent ESLint warnings from failing the build (arc source-map noise etc.)
          CI: false

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.BETA_SSH_KEY }}

      - name: Trust VPS host key
        env:
          SSH_HOST: ${{ secrets.BETA_SSH_HOST }}
          SSH_KNOWN_HOSTS: ${{ secrets.BETA_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "$SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
          else
            for attempt in 1 2 3 4 5; do
              if scan_output=$(ssh-keyscan -T 15 -p 22 -H "$SSH_HOST" 2>/tmp/ssh-keyscan.err) && [ -n "$scan_output" ]; then
                printf '%s\n' "$scan_output" >> ~/.ssh/known_hosts
                exit 0
              fi
              cat /tmp/ssh-keyscan.err >&2 || true
              if [ "$attempt" -lt 5 ]; then
                echo "ssh-keyscan attempt $attempt failed; retrying..." >&2
                sleep $((attempt * 5))
              fi
            done
            echo "ssh-keyscan failed after 5 attempts" >&2
            exit 1
          fi

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            build/ root@${{ secrets.BETA_SSH_HOST }}:/var/www/gfc-beta/

      - name: Deploy analytics server via rsync
        run: |
          rsync -avz --exclude='node_modules' --exclude='logs' \
            server/ root@${{ secrets.BETA_SSH_HOST }}:/opt/gfc-beta-analytics/

      - name: Write beta analytics env file
        run: |
          current_emergency_disabled_capabilities="$(
            ssh -o StrictHostKeyChecking=yes root@${{ secrets.BETA_SSH_HOST }} \
              "grep -E '^EMERGENCY_DISABLED_CAPABILITIES=' /opt/gfc-beta-analytics/.env 2>/dev/null | tail -n 1 | cut -d= -f2-"
          )"
          current_tstm_ingestion_enabled="$(
            ssh -o StrictHostKeyChecking=yes root@${{ secrets.BETA_SSH_HOST }} \
              "grep -E '^TSTM_INGESTION_ENABLED=' /opt/gfc-beta-analytics/.env 2>/dev/null | tail -n 1 | cut -d= -f2-"
          )"

          cat > beta-server.env <<EOF
          PORT=3007
          LOG_DIR=/opt/gfc-beta-analytics/logs
          APP_BASE_URL=https://beta-gfc.weatherboysuper.com
          SERVER_TARGET=beta
          BETA_MODE=true
          BETA_INVITE_TOKEN=${{ secrets.BETA_INVITE_TOKEN }}
          BETA_INVITE_PATH=${{ secrets.BETA_INVITE_PATH }}
          ADMIN_UID_ALLOWLIST=${{ secrets.ADMIN_UID_ALLOWLIST }}
          METRICS_HASH_SALT=${{ secrets.METRICS_HASH_SALT }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.BETA_STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_MONTHLY=${{ secrets.STRIPE_PRICE_MONTHLY }}
          STRIPE_PRICE_ANNUAL_STANDARD=${{ secrets.STRIPE_PRICE_ANNUAL_STANDARD }}
          STRIPE_PRICE_ANNUAL_PROMO=
          STRIPE_PROMO_START=
          STRIPE_PROMO_END=
          FIREBASE_ADMIN_PROJECT_ID=${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL=${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY=${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          SENTRY_BROWSER_DSN=${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT=beta
          SENTRY_RELEASE=graphical-forecast-creator@${{ steps.app_version.outputs.value }}
          EOF
          if [ -n "$current_emergency_disabled_capabilities" ]; then
            echo "Preserving active EMERGENCY_DISABLED_CAPABILITIES from beta analytics .env"
            echo "EMERGENCY_DISABLED_CAPABILITIES=${current_emergency_disabled_capabilities}" >> beta-server.env
          fi
          if [ "$current_tstm_ingestion_enabled" = "false" ]; then
            echo "Preserving emergency TSTM_INGESTION_ENABLED=false from beta analytics .env"
            echo "TSTM_INGESTION_ENABLED=false" >> beta-server.env
          fi
          node scripts/write-deployment-env.mjs deploy/beta-deployment-config.json >> beta-server.env
          rsync -avz beta-server.env root@${{ secrets.BETA_SSH_HOST }}:/opt/gfc-beta-analytics/.env

      - name: Install analytics dependencies and restart
        run: |
          ssh -o StrictHostKeyChecking=yes root@${{ secrets.BETA_SSH_HOST }} '
            cd /opt/gfc-beta-analytics
            npm install --omit=dev --quiet
            mkdir -p /opt/gfc-beta-analytics/logs
            if pm2 describe gfc-beta-analytics > /dev/null 2>&1; then
              pm2 restart gfc-beta-analytics
            else
              pm2 start analytics.js --name gfc-beta-analytics
            fi
            pm2 save
          '
