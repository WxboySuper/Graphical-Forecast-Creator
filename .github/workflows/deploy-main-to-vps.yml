name: Deploy Production to VPS

permissions:
  contents: read

# Triggers on every push to main (including the automated promote-beta-to-main push)
# and can also be triggered manually from the GitHub Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          # homepage in package.json is already the production URL (gfc.weatherboysuper.com)
          # so no PUBLIC_URL override is needed here.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_BETA_MODE: false
          VITE_BETA_INVITE_PATH: ''
          CI: false  # Prevent ESLint warnings from failing the build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Trust VPS host key
        run: ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts

      # Deploy the React build to the web root
      - name: Deploy site files via rsync
        run: |
          rsync -avz --delete \
            build/ root@${{ secrets.PROD_SSH_HOST }}:/var/www/gfc/

      # Deploy the analytics server source (excluding node_modules and logs)
      - name: Deploy analytics server via rsync
        run: |
          rsync -avz --exclude='node_modules' --exclude='logs' \
            server/ root@${{ secrets.PROD_SSH_HOST }}:/opt/gfc-analytics/

      - name: Write production analytics env file
        run: |
          cat > prod-server.env <<EOF
          PORT=3006
          LOG_DIR=/opt/gfc-analytics/logs
          APP_BASE_URL=https://gfc.weatherboysuper.com
          BETA_MODE=false
          BETA_INVITE_TOKEN=
          BETA_INVITE_PATH=
          ADMIN_UID_ALLOWLIST=${{ secrets.ADMIN_UID_ALLOWLIST }}
          METRICS_HASH_SALT=${{ secrets.METRICS_HASH_SALT }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.PROD_STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_MONTHLY=${{ secrets.STRIPE_PRICE_MONTHLY }}
          STRIPE_PRICE_ANNUAL_STANDARD=${{ secrets.STRIPE_PRICE_ANNUAL_STANDARD }}
          STRIPE_PRICE_ANNUAL_PROMO=
          STRIPE_PROMO_START=
          STRIPE_PROMO_END=
          FIREBASE_ADMIN_PROJECT_ID=${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL=${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY=${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          EOF
          rsync -avz prod-server.env root@${{ secrets.PROD_SSH_HOST }}:/opt/gfc-analytics/.env

      # Install prod dependencies and (re)start with PM2
      - name: Install analytics dependencies and restart
        run: |
          ssh root@${{ secrets.PROD_SSH_HOST }} '
            cd /opt/gfc-analytics
            npm install --omit=dev --quiet
            mkdir -p /opt/gfc-analytics/logs
            if pm2 describe gfc-analytics > /dev/null 2>&1; then
              pm2 restart gfc-analytics
            else
              pm2 start analytics.js --name gfc-analytics
            fi
            pm2 save
          '
