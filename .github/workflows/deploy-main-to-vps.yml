      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: app_version
        run: |
          RAW=$(node scripts/read-package-version.mjs)
          STABLE=$(node scripts/derive-stable-version.mjs "$RAW")
          if ! printf '%s' "$RAW" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid package version format: $RAW" >&2
            exit 1
          fi
          RELEASE_DIR=$(node -e "console.log('$STABLE'.replace(/[^0-9A-Za-z.-]+/g, '_'))")
          echo "raw=$RAW" >> "$GITHUB_OUTPUT"
          echo "stable=$STABLE" >> "$GITHUB_OUTPUT"
          echo "sentry_release=$STABLE" >> "$GITHUB_OUTPUT"
          echo "release_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Trust VPS host key
        run: ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Validate production release manifest
        id: manifest
        env:
          DEPLOY_ACTION: ${{ github.event.inputs.deploy_action == 'auto' && '' || github.event.inputs.deploy_action }}
          DEPLOY_FORCE: ${{ github.event.inputs.force && 'true' || 'false' }}
        run: |
          PREVIOUS_RELEASE_ID=$(ssh -o StrictHostKeyChecking=yes \
            "root@${{ secrets.PROD_SSH_HOST }}" \
            "node -e \"try{const c=JSON.parse(require('fs').readFileSync('/opt/gfc-analytics/config/production-release.json','utf8'));process.stdout.write(c.releaseId||'')}catch(e){}\"" \
            2>/dev/null || true)
          PREVIOUS_VPS_STATUS=$(ssh -o StrictHostKeyChecking=yes \
            "root@${{ secrets.PROD_SSH_HOST }}" \
            "node -e \"try{const c=JSON.parse(require('fs').readFileSync('/opt/gfc-analytics/config/production-release.json','utf8'));process.stdout.write(c.status||'')}catch(e){}\"" \
            2>/dev/null || true)
          export PREVIOUS_RELEASE_ID
          export PREVIOUS_VPS_STATUS
          node scripts/validate-production-release.mjs | tee /tmp/validate-release.txt
          ACTION=$(node -e "
            const fs=require('fs');
            const input=process.env.DEPLOY_ACTION||'';
            const raw=JSON.parse(fs.readFileSync('deploy/production-release.json','utf8'));
            const action=input||raw.action||'live';
            console.log(action);
          ")
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"
          if [ "$ACTION" = "none" ]; then
            echo "Deploy skipped (action=none)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build production frontend
        if: steps.manifest.outputs.skip != 'true'
        run: pnpm run build
        env:
          VITE_BUILD_TARGET: production
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_BETA_MODE: false
          VITE_BETA_INVITE_PATH: ''
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_GA_MEASUREMENT_ID: G-44J5RQTQDB
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          CI: false

      - name: Build staging preview frontend (beta access gate)
        if: steps.manifest.outputs.skip != 'true' && steps.manifest.outputs.action == 'stage'
        run: |
          mv build "build-production-${GITHUB_RUN_ID}"
          pnpm run build
          mv build build-staging
          mv "build-production-${GITHUB_RUN_ID}" build
        env:
          VITE_BUILD_TARGET: staging
          PUBLIC_URL: https://staging-gfc.weatherboysuper.com
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_BETA_MODE: true
          VITE_BETA_INVITE_PATH: ${{ secrets.BETA_INVITE_PATH }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: staging
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          CI: false

      - name: Write derived live alert banner
        if: steps.manifest.outputs.skip != 'true' && steps.manifest.outputs.action == 'stage'
        run: |
          BANNER_SURFACE=live-pre-promote node scripts/write-derived-alert-banner.mjs
          mv build/alert-banner.json build/alert-banner-live-pre.json

      - name: Write analytics env files
        if: steps.manifest.outputs.skip != 'true'
        run: |
          cat > prod-server.env <<EOF
          PORT=3006
          LOG_DIR=/opt/gfc-analytics/logs
          APP_BASE_URL=https://gfc.weatherboysuper.com
          SERVER_TARGET=production
          BETA_MODE=false
          BETA_INVITE_TOKEN=
          BETA_INVITE_PATH=
          ADMIN_UID_ALLOWLIST=${{ secrets.ADMIN_UID_ALLOWLIST }}
          METRICS_HASH_SALT=${{ secrets.METRICS_HASH_SALT }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.PROD_STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_MONTHLY=${{ secrets.STRIPE_PRICE_MONTHLY }}
          STRIPE_PRICE_ANNUAL_STANDARD=${{ secrets.STRIPE_PRICE_ANNUAL_STANDARD }}
          STRIPE_PRICE_ANNUAL_PROMO=
          STRIPE_PROMO_START=
          STRIPE_PROMO_END=
          FIREBASE_ADMIN_PROJECT_ID=${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL=${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY=${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          SENTRY_BROWSER_DSN=${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT=production
          SENTRY_RELEASE=graphical-forecast-creator@${{ steps.app_version.outputs.sentry_release }}
          EOF
          cat > staging-server.env <<EOF
          PORT=3008
          LOG_DIR=/opt/gfc-staging-analytics/logs
          APP_BASE_URL=https://staging-gfc.weatherboysuper.com
          SERVER_TARGET=staging
          BETA_MODE=true
          BETA_INVITE_TOKEN=${{ secrets.BETA_INVITE_TOKEN }}
          BETA_INVITE_PATH=${{ secrets.BETA_INVITE_PATH }}
          ADMIN_UID_ALLOWLIST=${{ secrets.ADMIN_UID_ALLOWLIST }}
          METRICS_HASH_SALT=${{ secrets.METRICS_HASH_SALT }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.BETA_STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_MONTHLY=${{ secrets.STRIPE_PRICE_MONTHLY }}
          STRIPE_PRICE_ANNUAL_STANDARD=${{ secrets.STRIPE_PRICE_ANNUAL_STANDARD }}
          STRIPE_PRICE_ANNUAL_PROMO=
          STRIPE_PROMO_START=
          STRIPE_PROMO_END=
          FIREBASE_ADMIN_PROJECT_ID=${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          FIREBASE_ADMIN_CLIENT_EMAIL=${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY=${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          SENTRY_BROWSER_DSN=${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT=staging
          SENTRY_RELEASE=graphical-forecast-creator@${{ steps.app_version.outputs.sentry_release }}
          EOF

      - name: Deploy live release (full)
        if: steps.manifest.outputs.skip != 'true' && steps.manifest.outputs.action == 'live'
        env:
          RELEASE_DIR: ${{ steps.app_version.outputs.release_dir }}
        run: |
          set -euo pipefail
          HOST="root@${{ secrets.PROD_SSH_HOST }}"

          ssh "$HOST" "mkdir -p /var/www/gfc/releases /opt/gfc-analytics/releases /opt/gfc-analytics/config /opt/gfc-analytics/logs"

          rsync -avz --delete build/ "$HOST:/var/www/gfc/releases/$RELEASE_DIR/"
          rsync -avz --exclude='node_modules' --exclude='logs' server/ "$HOST:/opt/gfc-analytics/releases/$RELEASE_DIR/"
          rsync -avz deploy/production-release.json "$HOST:/opt/gfc-analytics/config/production-release.json"
          rsync -avz prod-server.env "$HOST:/opt/gfc-analytics/config/.env"

          ssh "$HOST" "RELEASE_DIR='$RELEASE_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          WEB_ROOT=/var/www/gfc
          ANALYTICS_ROOT=/opt/gfc-analytics

          if [ ! -e "$WEB_ROOT/current" ] && [ -f "$WEB_ROOT/index.html" ]; then
            mkdir -p "$WEB_ROOT/releases/legacy"
            shopt -s dotglob
            for item in "$WEB_ROOT"/*; do
              base=$(basename "$item")
              case "$base" in
                releases|current) ;;
                *) mv "$item" "$WEB_ROOT/releases/legacy/" ;;
              esac
            done
          fi

          ln -sfn "$WEB_ROOT/releases/$RELEASE_DIR" "$WEB_ROOT/current"
          ln -sfn "$ANALYTICS_ROOT/releases/$RELEASE_DIR" "$ANALYTICS_ROOT/current"
          cd "$ANALYTICS_ROOT/current"
          npm install --omit=dev --quiet
          cp "$ANALYTICS_ROOT/config/.env" "$ANALYTICS_ROOT/current/.env"

          if pm2 describe gfc-analytics > /dev/null 2>&1; then
            pm2 restart gfc-analytics
          else
            pm2 start analytics.js --name gfc-analytics
          fi
          pm2 save
          REMOTE

      - name: Stage release on VPS (timed rollout)
        if: steps.manifest.outputs.skip != 'true' && steps.manifest.outputs.action == 'stage'
        env:
          RELEASE_DIR: ${{ steps.app_version.outputs.release_dir }}
        run: |
          set -euo pipefail
          HOST="root@${{ secrets.PROD_SSH_HOST }}"

          ssh "$HOST" "mkdir -p \
            /var/www/gfc/releases \
            /var/www/gfc-staging/releases \
            /opt/gfc-analytics/releases \
            /opt/gfc-analytics/config \
            /opt/gfc-staging-analytics/config \
            /opt/gfc-staging-analytics/logs"

          rsync -avz --delete build/ "$HOST:/var/www/gfc/releases/$RELEASE_DIR/"
          rsync -avz --delete build-staging/ "$HOST:/var/www/gfc-staging/releases/$RELEASE_DIR/"
          rsync -avz --exclude='node_modules' --exclude='logs' server/ "$HOST:/opt/gfc-analytics/releases/$RELEASE_DIR/"
          rsync -avz --exclude='node_modules' --exclude='logs' server/ "$HOST:/opt/gfc-staging-analytics/releases/$RELEASE_DIR/"
          rsync -avz deploy/production-release.json "$HOST:/opt/gfc-analytics/config/production-release.json"
          rsync -avz build/alert-banner-live-pre.json "$HOST:/tmp/alert-banner-live-pre.json"
          rsync -avz staging-server.env "$HOST:/opt/gfc-staging-analytics/config/.env"

          ssh "$HOST" "RELEASE_DIR='$RELEASE_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          WEB_ROOT=/var/www/gfc
          STAGING_WEB_ROOT=/var/www/gfc-staging
          ANALYTICS_ROOT=/opt/gfc-analytics
          STAGING_ANALYTICS_ROOT=/opt/gfc-staging-analytics

          ln -sfn "$STAGING_WEB_ROOT/releases/$RELEASE_DIR" "$STAGING_WEB_ROOT/current"

          LIVE_WEB="$WEB_ROOT/current"
          if [ ! -e "$LIVE_WEB" ]; then
            LIVE_WEB="$WEB_ROOT"
          fi
          cp /tmp/alert-banner-live-pre.json "$LIVE_WEB/alert-banner.json"

          mkdir -p "$STAGING_ANALYTICS_ROOT/releases"
          ln -sfn "$STAGING_ANALYTICS_ROOT/releases/$RELEASE_DIR" "$STAGING_ANALYTICS_ROOT/current"
          cd "$STAGING_ANALYTICS_ROOT/current"
          npm install --omit=dev --quiet
          cp "$STAGING_ANALYTICS_ROOT/config/.env" "$STAGING_ANALYTICS_ROOT/current/.env"

          export CONFIG_PATH="$ANALYTICS_ROOT/config/production-release.json"
          node "$ANALYTICS_ROOT/releases/$RELEASE_DIR/release/mark-release-staged.mjs"

          if pm2 describe gfc-staging-analytics > /dev/null 2>&1; then
            pm2 restart gfc-staging-analytics --update-env
          else
            pm2 start "$STAGING_ANALYTICS_ROOT/current/analytics.js" --name gfc-staging-analytics
          fi
          pm2 save
          REMOTE
