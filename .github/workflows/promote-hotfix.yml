name: Promote Hotfix to Production

# Merges a hotfix/* branch into main (triggering a deploy) and back-merges into beta.
#
# Usage:
#   1. Branch off main locally:  git checkout -b hotfix/your-fix main
#   2. Make the fix, commit, push:  git push origin hotfix/your-fix
#   3. Run this workflow from the Actions tab, enter the branch name (e.g. hotfix/your-fix)
#
# Required secrets: GH_PAT (repo scope) — same as promote-beta-to-main.yml
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Hotfix branch name (e.g. hotfix/fix-export-crash)'
        required: true
      confirm:
        description: 'Type "yes" to confirm deploying this hotfix to production'
        required: true
        default: 'no'

jobs:
  promote-hotfix:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Validate hotfix branch exists
        run: |
          git fetch origin
          if ! git ls-remote --exit-code --heads origin "${{ github.event.inputs.branch }}"; then
            echo "ERROR: Branch '${{ github.event.inputs.branch }}' not found on origin."
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Merge hotfix → main ───────────────────────────────────────────────
      # This push (via GH_PAT) triggers deploy-main-to-vps.yml automatically.
      - name: Merge hotfix into main
        run: |
          git checkout main
          git merge --no-ff origin/${{ github.event.inputs.branch }} \
            -m "hotfix: merge ${{ github.event.inputs.branch }} → main [automated]"
          git push origin main

      # ── Back-merge hotfix → beta ──────────────────────────────────────────
      # Keeps beta in sync so the fix isn't lost when beta is next promoted.
      - name: Back-merge hotfix into beta
        run: |
          git checkout beta
          git merge --no-ff origin/${{ github.event.inputs.branch }} \
            -m "hotfix: back-merge ${{ github.event.inputs.branch }} → beta [automated]"
          git push origin beta

      - name: Summary
        run: |
          echo "✅ Hotfix '${{ github.event.inputs.branch }}' merged into main and beta."
          echo "   deploy-main-to-vps.yml is now running — production will update shortly."
