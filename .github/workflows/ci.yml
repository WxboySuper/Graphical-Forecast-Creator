name: CI

on:
  push:
    branches: [main, beta]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-governance:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Fetch PR branches
        run: git fetch origin "${{ github.base_ref }}" "${{ github.head_ref }}"

      - name: Branch policy
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: node scripts/validate-branch-policy.mjs

      - name: Port PR policy
        if: startsWith(github.head_ref, 'port/')
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/validate-port-pr-policy.mjs

      - name: Changelog policy
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/check-changelog-pr.mjs

      - name: Production release manifest (beta → main)
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/validate-production-release-pr.mjs

  package-version-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Validate release automation unit tests
        run: node --test scripts/lib/package-version.test.mjs scripts/lib/bump-beta-after-main-release.test.mjs scripts/lib/branch-policy.test.mjs scripts/lib/port-pr-policy.test.mjs scripts/lib/version-bump.test.mjs scripts/lib/glob-match.test.mjs scripts/lib/pr-labels.test.mjs scripts/lib/changelog.test.mjs scripts/lib/dependabot-changelog.test.mjs scripts/lib/production-release.test.mjs

      - name: Validate package version for target branch
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: node scripts/validate-package-version.mjs

  build-and-test:
    needs: [package-version-policy, pr-governance]
    if: >-
      always() &&
      needs.package-version-policy.result == 'success' &&
      (needs.pr-governance.result == 'success' || needs.pr-governance.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22.12.0', '24.x', '25.x']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          CI: false

      - name: Run tests
        run: pnpm test --silent
        env:
          CI: true

      - name: Run analytics server tests
        working-directory: server
        run: npm ci && npm test
