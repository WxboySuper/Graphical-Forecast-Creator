name: CI

on:
  push:
    branches: [main, beta]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-governance:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Fetch PR branches
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: git fetch origin "$GITHUB_BASE_REF" "$GITHUB_HEAD_REF"

      - name: Branch policy
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: node scripts/validate-branch-policy.mjs

      - name: Port PR policy
        if: startsWith(github.head_ref, 'port/')
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/validate-port-pr-policy.mjs

      - name: Changelog policy
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/check-changelog-pr.mjs

      - name: Production release manifest (beta → main)
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: node scripts/validate-production-release-pr.mjs

      - name: Setup Node.js for promotion exposure report
        if: github.base_ref == 'main' && github.head_ref == 'beta'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.x'

      - name: Setup pnpm for promotion exposure report
        if: github.base_ref == 'main' && github.head_ref == 'beta'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.30.3

      - name: Install dependencies for promotion exposure report
        if: github.base_ref == 'main' && github.head_ref == 'beta'
        run: pnpm install --frozen-lockfile

      - name: Production exposure report (beta → main)
        if: github.base_ref == 'main' && github.head_ref == 'beta'
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node scripts/validate-promotion-exposure-pr.mjs

  package-version-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.x'

      - name: Validate release automation unit tests
        run: node --test scripts/lib/package-version.test.mjs scripts/lib/bump-beta-after-main-release.test.mjs scripts/lib/deployment-config.test.mjs scripts/lib/branch-policy.test.mjs scripts/lib/port-pr-policy.test.mjs scripts/lib/port-targets.test.mjs scripts/lib/port-conflicts.test.mjs scripts/lib/version-bump.test.mjs scripts/lib/glob-match.test.mjs scripts/lib/pr-labels.test.mjs scripts/lib/pr-ci-label-state.test.mjs scripts/lib/github-paginate.test.mjs scripts/lib/changelog.test.mjs scripts/lib/beta-changelog.test.mjs scripts/lib/dependabot-changelog.test.mjs scripts/lib/production-release.test.mjs scripts/lib/stale-branch-report.test.mjs

      - name: Validate package version for target branch
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
        run: node scripts/validate-package-version.mjs

  firestore-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Setup Java for the Firestore Emulator
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hostile-client Firestore rules tests
        run: pnpm test:firestore-rules

  feature-exposure-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.30.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate feature exposure policy
        run: pnpm validate:feature-exposure

      - name: Run feature exposure test suite
        run: pnpm test:exposure

      - name: Run feature exposure integration tests
        run: node --test scripts/validate-feature-exposure.integration.test.mjs scripts/generate-exposure-report.integration.test.mjs

  build-and-test:
    needs: [package-version-policy, pr-governance, feature-exposure-policy]
    if: >-
      always() &&
      needs.package-version-policy.result == 'success' &&
      needs.feature-exposure-policy.result == 'success' &&
      (needs.pr-governance.result == 'success' || needs.pr-governance.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['22.12.0', '24.x', '25.x']
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          CI: false
          VITE_BUILD_TARGET: local

      - name: Run tests
        run: pnpm test --silent
        env:
          CI: true

      - name: Run analytics server tests
        working-directory: server
        run: |
          if node -e "const s=require('./package.json').scripts; process.exit(s && s.test ? 0 : 1)"; then
            npm ci
            npm test
          else
            echo "Skipping server tests: no test script in server/package.json on this branch."
          fi
