# Nginx config for gfc.weatherboysuper.com
# ─────────────────────────────────────────────────────────────────────────────
# 1. Copy this file to /etc/nginx/sites-available/gfc
# 2. symlink:  ln -s /etc/nginx/sites-available/gfc /etc/nginx/sites-enabled/gfc
# 3. Test:     nginx -t
# 4. Reload:   systemctl reload nginx
# 5. SSL:      certbot --nginx -d gfc.weatherboysuper.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name gfc.weatherboysuper.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gfc.weatherboysuper.com;

    # SSL — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/gfc.weatherboysuper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gfc.weatherboysuper.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/gfc/current;
    index index.html;

    # ── Analytics collector ───────────────────────────────────────────────────
    location = /api/collect {
        proxy_pass          http://127.0.0.1:3006/collect;
        proxy_set_header    X-Forwarded-For $remote_addr;
        proxy_set_header    X-Real-IP       $remote_addr;
        client_max_body_size 2k;
        limit_except POST { deny all; }
    }

    # ── Sentry tunnel — proxy browser envelopes past ad blockers ──────────
    location = /api/sentry-tunnel {
        proxy_pass          http://127.0.0.1:3006/api/sentry-tunnel;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Forwarded-For   $remote_addr;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
        client_max_body_size 100k;
        limit_except POST { deny all; }
    }

    location /api/ {
        proxy_pass          http://127.0.0.1:3006;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Forwarded-For   $remote_addr;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # ── What's New SPA route ─────────────────────────────────────────────────
    # public/updates/ holds release screenshots (/updates/v1.6/*.png). try_files
    # would treat /updates and /updates/ as that directory (no index) → 403.
    # In-app links use client-side routing and never hit this; direct URLs do.
    location = /updates {
        try_files /index.html =404;
    }
    location = /updates/ {
        try_files /index.html =404;
    }

    # ── React SPA — serve index.html for all client-side routes ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ───────────────────────────────────────────────────
    # CRA hashes filenames, so 1-year cache + immutable is safe
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
