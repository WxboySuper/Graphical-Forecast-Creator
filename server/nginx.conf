# Nginx config for gfc.weatherboysuper.com
# ─────────────────────────────────────────────────────────────────────────────
# 1. Copy this file to /etc/nginx/sites-available/gfc
# 2. symlink:  ln -s /etc/nginx/sites-available/gfc /etc/nginx/sites-enabled/gfc
# 3. Test:     nginx -t
# 4. Reload:   systemctl reload nginx
# 5. SSL:      certbot --nginx -d gfc.weatherboysuper.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name gfc.weatherboysuper.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gfc.weatherboysuper.com;

    # SSL — managed by Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/gfc.weatherboysuper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gfc.weatherboysuper.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/gfc;
    index index.html;

    # ── Analytics collector ───────────────────────────────────────────────────
    # Proxy POST /api/collect → analytics server on loopback port 3001
    location = /api/collect {
        proxy_pass          http://127.0.0.1:3001/collect;
        proxy_set_header    X-Forwarded-For $remote_addr;
        proxy_set_header    X-Real-IP       $remote_addr;
        client_max_body_size 2k;
        # Only allow POST
        limit_except POST { deny all; }
    }

    # ── React SPA — serve index.html for all client-side routes ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ───────────────────────────────────────────────────
    # CRA hashes filenames, so 1-year cache + immutable is safe
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
