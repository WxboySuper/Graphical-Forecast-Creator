# Nginx config for staging-gfc.weatherboysuper.com (beta-gated preview of staged production builds)
# ─────────────────────────────────────────────────────────────────────────────
# 1. Copy to /etc/nginx/sites-available/gfc-staging
# 2. ln -s /etc/nginx/sites-available/gfc-staging /etc/nginx/sites-enabled/
# 3. certbot --nginx -d staging-gfc.weatherboysuper.com
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name staging-gfc.weatherboysuper.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging-gfc.weatherboysuper.com;

    ssl_certificate     /etc/letsencrypt/live/staging-gfc.weatherboysuper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging-gfc.weatherboysuper.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/gfc-staging/current;
    index index.html;

    # ── Sentry tunnel — proxy browser envelopes past ad blockers ──────────
    location = /api/sentry-tunnel {
        proxy_pass          http://127.0.0.1:3008/api/sentry-tunnel;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Forwarded-For   $remote_addr;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
        client_max_body_size 100k;
        limit_except POST { deny all; }
    }

    location /api/ {
        proxy_pass          http://127.0.0.1:3008;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Forwarded-For   $remote_addr;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    location = /updates {
        try_files /index.html =404;
    }
    location = /updates/ {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
