server {
    listen 80;
    server_name telemetry.gfc.weatherboysuper.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name telemetry.gfc.weatherboysuper.com;

    ssl_certificate     /etc/letsencrypt/live/telemetry.gfc.weatherboysuper.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telemetry.gfc.weatherboysuper.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3009;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
